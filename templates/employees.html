<!DOCTYPE html>
<html>
<head>

<title>Employee Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.header{
    background:#1f2937;
    color:white;
    padding:20px;
}

.container{
    padding:30px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{

    background:white;

    width:250px;

    padding:20px;

    border-radius:12px;

    box-shadow:
    0px 2px 10px rgba(0,0,0,0.1);
}

.card h2{
    margin-top:0;
}

.btn{

    display:inline-block;

    text-decoration:none;

    color:white;

    background:#2563eb;

    padding:10px 15px;

    border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
<h1>👥 Employee Dashboard</h1>
</div>

<div class="container">

<div class="cards">

{% for emp in employees %}

<div class="card">

<h2>👤 {{ emp.employee_id }}</h2>

<p>
📁 Documents:
{{ emp.document_count }}
</p>

<a
class="btn"
href="/documents?employee_id={{ emp.employee_id }}">
View Documents
</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
