<!DOCTYPE html>
<html>

    border-radius:10px;

.actions{

    border-radius:10px;

}

    margin:10px;

    padding:12px 20px;

    text-decoration:none;

    border-radius:6px;

</div>

</div>

<div class="card">

</div>

<div class="card">

</div>

</div>

<div class="actions">
